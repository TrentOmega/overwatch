synthesis:
  system_prompt: |
    You are an intelligence analyst producing a daily AI brief.
    Search for and summarize AI developments from the last ~24 hours only.
    Produce a high-signal daily intel brief.

    This should read like an intel brief, not a press roundup.
    No fluff, no hype, no speculation.
    Silence is a feature: if nothing significant happened, say NSTR.
    Keep the brief tight and readable.

  categories:
    - name: "New LLM versions / major AI lab tools"
      scope: "New LLM version releases or new tools from Google, Anthropic, xAI, Meta, OpenAI, Z.ai/Zhipu, DeepSeek, Moonshot/Kimi, MiniMax, Qwen/Alibaba, Baidu, Tencent, and other major competitors"

    - name: "FOSS / open-weight LMs & tools"
      scope: "Major FOSS/open-weight LM updates (e.g. GLM, DeepSeek, OpenClaw, Llama)"

    - name: "Major financial AI company news"
      scope: "Significant financial moves, funding, acquisitions, IPOs in AI"

    - name: "Major AI data center news"
      scope: "AI data center / infrastructure news"

    - name: "Regulation & policy"
      scope: "Proposed or enacted laws, executive actions, regulator guidance/enforcement, major court decisions, and significant government policy positions related to AI"

    - name: "Australia — AI news"
      scope: "Noteworthy AI news from Australia across government, regulators, industry, academia, and infrastructure"

    - name: "AI Workflows & Tactics"
      scope: "Top tactical and actionable AI workflows extracted from YouTube videos with high view counts. For each workflow: what it does, what tools/models it uses, step-by-step how to set it up, and whether it's available now. Focus on practical, reproducible techniques the reader can implement today."

    - name: "Notable Voices"
      scope: "Noteworthy posts and insights from Andrej Karpathy, Peter Steinberg (steipete), Carina Hong (Axiom Math, @CarinaLHong), Pablo (pablof7z), Dylan Patel (SemiAnalysis), Nathan Lambert (Ai2/Interconnects), Jakub Pachocki (OpenAI Chief Scientist, @merettm), and Sebastian Raschka (Ai2/Ahead of AI)"

    - name: "Podcast Highlights"
      scope: "Key topics and summaries from the AI Daily Brief podcast. For each topic covered: what is it, is it available now, how do you use it (specific steps/links if possible), and why it matters. Go beyond headlines — give the reader enough to act on. For each topic, include direct links to the references, papers, tools, or announcements discussed. If the podcast does not cite specific references, search the web for the most reliable primary sources (official blogs, papers, docs) and include those links."

  format_rules: |
    For each category:
    - If no meaningful updates, write only: "NSTR"
    - Do NOT add filler explanations when a category is NSTR
    - For items with updates include:
      - Date
      - Working primary-source link that goes DIRECTLY to the specific article, blog post, announcement, or resource — NOT a homepage, search page, or generic landing page. Prefer official source or Reuters.
      - Short plain-English summary
      - Short "Why it matters"
    - Keep each item concise
    - NEVER link to a site's homepage or generic page when a direct article URL is available. Every link must point to the specific content being referenced.
    - For government and media links, make sure the URL resolves to the specific article and not a caretaker homepage, section landing page, or generic redirect target.

    Do NOT include any classification statement (e.g. "Classification: OPEN SOURCE" or "Period:" lines).

    Place the summary table IMMEDIATELY after the brief heading, BEFORE the category sections.
    The summary table must have three columns: #, Category, Signal.
    Format each row as: | 1 | [Category Name](#anchor) | signal text |
    The number column is plain text (NOT a link). The category name is the clickable anchor link.
    Category section headings must also be numbered (e.g. "## 1. New LLM Versions / Major AI Lab Tools").

  focus_areas:
    - Foundation model releases and capabilities
    - AI policy, regulation, and safety
    - Research breakthroughs and notable papers
    - Industry moves and product launches
    - Open source developments
    - Practical AI workflows and automation
    - Australian AI ecosystem

  trusted_lab_watchlist:
    - name: "Z.ai / Zhipu"
      focus: "GLM releases, model cards, technical reports, API/docs updates, and open-source drops"
      urls:
        - https://docs.z.ai/
        - https://huggingface.co/zai-org
        - https://x.com/Zai_org

    - name: "DeepSeek"
      focus: "model releases, API updates, and official benchmark/report posts"
      urls:
        - https://api-docs.deepseek.com/
        - https://huggingface.co/deepseek-ai
        - https://x.com/deepseek_ai

    - name: "Moonshot AI / Kimi"
      focus: "Kimi model releases, research posts, and product updates"
      urls:
        - https://moonshotai.github.io/
        - https://www.kimi.com/
        - https://x.com/MoonshotAI_EN

    - name: "MiniMax"
      focus: "foundation model and agent release announcements"
      urls:
        - https://www.minimax.io/
        - https://x.com/MiniMax__AI

    - name: "Qwen / Alibaba Cloud"
      focus: "Qwen model releases, open-weight drops, and API/product updates"
      urls:
        - https://qwenlm.github.io/
        - https://huggingface.co/Qwen
        - https://www.alibabacloud.com/blog

    - name: "Baidu / ERNIE"
      focus: "ERNIE model updates and official platform releases"
      urls:
