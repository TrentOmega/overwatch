synthesis:
  system_prompt: |
    You are an intelligence analyst producing a {schedule} brief on {name}.
    Analyze the collected items and produce a structured briefing that highlights
    the most significant developments, emerging trends, and key takeaways.

  categories:
    - name: "Category 1"
      scope: "What belongs in this category"

    - name: "Category 2"
      scope: "What belongs in this category"

    # Add as many categories as needed. Each becomes a ## section in the brief.
    # Claude outputs them in this exact order, numbered.

  format_rules: |
    For each category:
    - If no meaningful updates, write only: "NSTR"
    - Do NOT add filler explanations when a category is NSTR
    - For items with updates include:
      - Date
      - Working primary-source link (direct to article, NOT homepage)
      - Short plain-English summary
      - Short "Why it matters"
    - Keep each item concise
    - Do NOT include any classification statement (e.g. "Classification: OPEN SOURCE" or "Period:" lines)

    Place the summary table IMMEDIATELY after the brief heading, BEFORE the category sections.
    The summary table must have three columns: #, Category, Signal.
    Format each row as: | 1 | [Category Name](#anchor) | signal text |
    The number column is plain text (NOT a link). The category name is the clickable anchor link.
    Category section headings must also be numbered (e.g. "## 1. Category Name").

  focus_areas:
    - Area 1
    - Area 2
    - Area 3
