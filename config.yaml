output_dir: output
state_dir: state
ai:
  provider: codex
  timeout_seconds: 600
  providers:
    claude:
      command: ["claude", "-p", "-"]
      model_flag: "--model"
      strip_env: ["CLAUDECODE"]
      working_dir: /tmp
    codex:
      command: ["codex", "--search", "exec", "--skip-git-repo-check", "--sandbox", "read-only", "--color", "never", "-"]
      model_flag: "--model"
      output_mode: file
      output_file_flag: "--output-last-message"
      working_dir: /tmp
publisher:
  type: git
  auto_push: true
